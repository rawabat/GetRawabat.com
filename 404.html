<style>

*{
margin:0;
padding:0;

}

body{
font-family:'Cairo',sans-serif;
background:
radial-gradient(circle at top right,#00d4aa22,transparent 30%),

color:#fff;
min-height:100vh;
display:flex;
align-items:center;

.container{

width:100%;
text-align:center;
padding:60px 35px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.03);
backdrop-filter:blur(14px);
border-radius:28px;

position:relative;
overflow:hidden;
}

.glow{
position:absolute;
width:280px;
height:280px;
background:#00d4aa22;

right:-80px;

}

.content{
position:relative;
z-index:2;
}

.error-code{
font-size:120px;
font-weight:800;
line-height:1;
background:linear-gradient(90deg,#00d4aa,#ffb84d);

}

h1{
font-size:42px;
margin-bottom:18px;
font-weight:800;
line-height:1.4;
}

p{
font-size:20px;
color:#cfcfcf;
line-height:1.9;
margin-bottom:35px;
}

.buttons{
display:flex;
gap:18px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:16px 28px;
border-radius:14px;
font-weight:800;
font-size:16px;
text-decoration:none;
transition:.3s ease;
display:inline-flex;
align-items:center;
justify-content:center;
min-width:220px;
}

.btn-primary{
background:linear-gradient(135deg,#00d4aa,#00b894);
color:#000;
box-shadow:0 10px 30px rgba(0,212,170,.35);
}

.btn-primary:hover{
transform:translateY(-3px) scale(1.02);
}

.btn-secondary{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.1);
color:#fff;
}

.btn-secondary:hover{
background:rgba(255,255,255,.12);
}

.small{
margin-top:35px;
font-size:14px;
opacity:.7;
}

@media(max-width:768px){

.error-code{
font-size:90px;
}

h1{
font-size:30px;
}

p{
font-size:17px;
}

.container{
padding:45px 24px;
}

.btn{
width:100%;
}

}

</style>
